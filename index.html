<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube Live Celebration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: #050505; color: #fce8cc; overflow-x: hidden; }
        
        .glass-card { background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); }
        .gold-glow { text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .btn-gold { background: linear-gradient(135deg, #D4AF37 0%, #8B6508 100%); color: #000; font-weight: 800; transition: transform 0.2s; }
        .btn-gold:hover { transform: scale(1.02); }

        .particle { position: fixed; top: -50px; pointer-events: none; z-index: 1000; font-size: 24px; animation: fall linear forwards; }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-500 to-amber-700 gold-glow">
                ✨ စမ်းရေမိုး YouTube Live Celebration Hub ✨
            </h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: OBS Overlay Area -->
            <div class="lg:col-span-8">
                <div class="glass-card relative rounded-3xl p-8 flex flex-col items-center justify-center min-h-[400px] border-2 border-amber-500/20">
                    <div id="display-area" class="text-center space-y-4">
                        <h2 id="display-name" class="text-4xl font-bold text-amber-100">မွေးနေ့ဂုဏ်ပြုပွဲ</h2>
                        <div class="w-20 h-1 bg-amber-600 mx-auto rounded-full"></div>
                        <p id="display-wish" class="text-2xl text-amber-200/80 italic leading-relaxed">ပရိသတ်များ ဆုတောင်းစာ ပို့ရန် စောင့်ဆိုင်းနေပါသည်...</p>
                    </div>
                </div>
            </div>

            <!-- Right: Control Panel -->
            <div class="lg:col-span-4 space-y-6">
                <div class="glass-card p-6 rounded-2xl">
                    <h2 class="text-lg font-bold text-amber-400 mb-4">ဆုတောင်းစာ ပို့ရန်</h2>
                    <input id="v-name" type="text" placeholder="သင်၏အမည်" class="w-full bg-black/50 border border-amber-500/30 rounded-xl p-3 text-amber-100 mb-3 focus:border-amber-500 outline-none">
                    <textarea id="v-wish" placeholder="မွေးနေ့ဆုတောင်း..." class="w-full bg-black/50 border border-amber-500/30 rounded-xl p-3 text-amber-100 mb-3 h-24 focus:border-amber-500 outline-none"></textarea>
                    
                    <label class="block text-xs text-amber-500 mb-2">Effect ရွေးရန်:</label>
                    <select id="effect-type" class="w-full bg-black/50 text-amber-100 p-2 rounded-lg mb-4 border border-amber-500/30">
                        <option value="flower">🌸 ပန်းမိုး</option>
                        <option value="snow">❄️ နှင်းမိုး</option>
                        <option value="gold">✨ ရွှေမိုး</option>
                    </select>

                    <button onclick="submitWish()" class="w-full py-3 btn-gold rounded-xl">ပေးပို့မည်</button>
                </div>

                <div class="glass-card p-4 rounded-2xl flex flex-col items-center">
                    <div id="qrcode" class="bg-white p-2 rounded-lg"></div>
                    <p class="text-xs text-amber-500/70 mt-3">Scan ဖတ်ပြီး ဆုတောင်းပေးပို့နိုင်ပါသည်</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Config Placeholder
        const firebaseConfig = { apiKey: "YOUR_API_KEY", databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com", projectId: "YOUR_PROJECT_ID" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        new QRCode(document.getElementById("qrcode"), window.location.href);

        db.ref('latestWish').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('display-name').innerText = `✨ ${data.name} ✨`;
                document.getElementById('display-wish').innerText = data.wish;
                triggerEffect(data.effect || 'gold');
            }
        });

        function submitWish() {
            const name = document.getElementById('v-name').value;
            const wish = document.getElementById('v-wish').value;
            const effect = document.getElementById('effect-type').value;
            if(!name || !wish) return alert("အချက်အလက် ပြည့်စုံအောင် ဖြည့်ပါ။");
            
            db.ref('latestWish').set({ name, wish, effect, timestamp: Date.now() });
        }

        function triggerEffect(type) {
            const symbols = {
                'flower': ['🌸', '🌺', '🌼', '🌷'],
                'snow': ['❄️', '❅', '❆'],
                'gold': ['✨', '🌟', '💰']
            };
            const items = symbols[type] || symbols['gold'];

            for(let i=0; i<30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = items[Math.floor(Math.random() * items.length)];
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 2 + 2) + 's';
                p.style.fontSize = (Math.random() * 20 + 20) + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }
        }
    </script>
</body>
</html>
