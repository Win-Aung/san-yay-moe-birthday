<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube Live Celebration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #0a0614; color: #fce8cc; overflow-x: hidden; }
        .royal-gold { background: linear-gradient(135deg, #2d1b4e 0%, #0a0614 100%); }
        .glass-morphism { background: rgba(26, 11, 46, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.3); }
        .confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .banner-float { animation: floatIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes floatIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="royal-gold min-h-screen">

    <canvas id="confetti" class="confetti-canvas"></canvas>

    <div id="app-container" class="max-w-4xl mx-auto p-4">
        <!-- Mode Switcher -->
        <div class="mb-6 flex gap-4 justify-center">
            <button onclick="setMode('admin')" class="px-6 py-2 bg-purple-900 rounded-full border border-gold-500 shadow-lg text-sm text-white">Control Panel</button>
            <button onclick="setMode('overlay')" class="px-6 py-2 bg-green-900 rounded-full border border-green-500 shadow-lg text-sm text-white">OBS Overlay</button>
        </div>

        <!-- Admin Section -->
        <div id="admin-section" class="glass-morphism p-8 rounded-2xl">
            <h2 class="text-2xl font-bold text-[#D4AF37] mb-6 border-b border-[#D4AF37]/30 pb-2">ပရိသတ်ဆုတောင်း လက်ခံမည်</h2>
            
            <!-- QR Code Container -->
            <div class="flex flex-col items-center mb-6">
                <p class="text-sm text-amber-500 mb-2">ပရိသတ်များ Scan ဖတ်ရန်:</p>
                <div id="qrcode" class="bg-white p-2 rounded-lg"></div>
            </div>

            <div class="space-y-4">
                <input id="fan-name" type="text" placeholder="ပရိသတ်အမည်" class="w-full bg-black/50 p-3 rounded-lg border border-amber-800 text-white placeholder-gray-500 focus:outline-none focus:border-[#D4AF37]">
                <textarea id="fan-wish" placeholder="ဆုတောင်းစကား..." class="w-full bg-black/50 p-3 rounded-lg border border-amber-800 text-white placeholder-gray-500 focus:outline-none focus:border-[#D4AF37] h-24"></textarea>
                <button id="wish-btn" onclick="submitWish()" class="w-full bg-[#D4AF37] hover:bg-[#b89620] py-3 text-black font-bold rounded-lg transition-all transform active:scale-95">Screen ပေါ်တင်မည်</button>
            </div>
        </div>

        <!-- Overlay Section -->
        <div id="overlay-section" class="hidden flex flex-col items-center justify-center h-[70vh]">
            <div id="live-banner" class="hidden glass-morphism p-10 rounded-3xl border-2 border-[#D4AF37] text-center max-w-xl w-full shadow-[0_0_60px_rgba(212,175,55,0.2)]">
                <h3 id="display-name" class="text-3xl font-bold text-[#D4AF37] mb-4 tracking-wide"></h3>
                <p id="display-wish" class="text-xl text-white italic leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        // 🚨 ဤနေရာတွင် သင့် Firebase Config ကို ပြန်ထည့်ပေးပါ 🚨
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://your-app.firebaseio.com",
            projectId: "your-app"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // QR Code Generator
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.href,
            width: 120, height: 120
        });

        function setMode(mode) {
            document.getElementById('admin-section').classList.toggle('hidden', mode !== 'admin');
            document.getElementById('overlay-section').classList.toggle('hidden', mode !== 'overlay');
        }

        function submitWish() {
            const name = document.getElementById('fan-name').value;
            const wish = document.getElementById('fan-wish').value;
            if(!name || !wish) return alert("အချက်အလက် ပြည့်စုံအောင် ဖြည့်ပါ။");
            database.ref('wishes/').push({ name, wish, time: Date.now() });
            document.getElementById('fan-name').value = '';
            document.getElementById('fan-wish').value = '';
        }

        database.ref('wishes/').limitToLast(1).on('value', (snapshot) => {
            snapshot.forEach((child) => {
                const data = child.val();
                displayBanner(data);
            });
        });

        function displayBanner(data) {
            const banner = document.getElementById('live-banner');
            document.getElementById('display-name').innerText = `✨ ${data.name} ✨`;
            document.getElementById('display-wish').innerText = data.wish;
            banner.classList.remove('hidden');
            banner.classList.add('banner-float');
            triggerConfetti();
            setTimeout(() => { banner.classList.add('hidden'); }, 10000);
        }

        function triggerConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            let particles = Array.from({length: 60}, () => ({
                x: Math.random() * canvas.width, y: -20, size: Math.random()*6+2, speed: Math.random()*3+2, color: '#D4AF37'
            }));
            function draw() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => {
                    p.y += p.speed;
                    ctx.fillStyle = p.color;
                    ctx.beginPath(); 
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); 
                    ctx.fill();
                });
                if(particles.some(p => p.y < canvas.height)) requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
