<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube Live Celebration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #090610; color: #fce8cc; overflow-x: hidden; }
        .royal-gold-gradient { background: linear-gradient(135deg, #FFE89C 0%, #D4AF37 50%, #8B6508 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .curtain-backdrop { background: linear-gradient(90deg, #2b0307 0%, #110103 50%, #2b0307 100%); }
        .glass-panel { background: rgba(15, 10, 25, 0.80); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); }
    </style>
</head>
<body class="relative min-h-screen">
    <div class="container mx-auto px-4 py-6 relative z-10">
        <header class="text-center mb-6">
            <h1 class="text-2xl md:text-4xl font-extrabold royal-gold-gradient tracking-wider font-serif">✨ စမ်းရေမိုး YouTube Live Celebration Hub ✨</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
            <div class="lg:col-span-8 flex flex-col gap-5">
                <div id="live-overlay-container" class="relative w-full aspect-video rounded-xl shadow-2xl overflow-hidden curtain-backdrop border border-amber-500/40 p-8 flex flex-col justify-center items-center">
                    <div id="slide-display-area" class="text-center">
                        <h2 id="slide-title" class="text-2xl md:text-4xl font-bold text-amber-100 mb-4 font-serif">စမ်းရေမိုး မွေးနေ့ပွဲတော်</h2>
                        <p id="slide-content" class="text-lg text-amber-200/90 leading-relaxed">မင်းသားလေး၏ မွေးနေ့ရက်မြတ်မှာ ပရိသတ်များရဲ့ မေတ္တာအပြည့်နဲ့ ဆုတောင်းစကားများ စောင့်ဆိုင်းနေပါသည်...</p>
                    </div>
                    <div id="wish-card-display" class="hidden w-full bg-black/60 p-6 rounded-xl border border-amber-500/50">
                        <h3 id="wish-sender-title" class="text-xl font-bold text-amber-300 mb-3"></h3>
                        <p id="wish-generated-text" class="text-lg text-white italic"></p>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-4 flex flex-col gap-5">
                <div class="glass-panel p-5 rounded-xl border border-amber-500/40">
                    <h2 class="text-lg font-bold text-amber-300 mb-2">ပရိသတ်ဆုတောင်း ပေးပို့ရန်</h2>
                    <div class="flex flex-col items-center bg-black/40 p-4 rounded-lg">
                        <!-- QR Code ကို သင့် Website လင့်ခ်အစစ်ဖြင့် ပြောင်းလဲရန် -->
                        <img id="qr-image" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://YOUR_LIVE_URL_HERE" alt="Scan to Wish" class="w-[150px] h-[150px] bg-white p-1 rounded-lg">
                        <p class="text-xs mt-2 text-amber-500">Scan ဖတ်ပြီး ဆုတောင်းစာလေးများ ပေးပို့နိုင်ပါသည်</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ဆုတောင်းစာသားများ
        const newWishes = {
            royal: [
                "ရွှေမင်းသားလေး စမ်းရေမိုး၊ ဤမွေးနေ့မှစ၍ အနုပညာလမ်းကြောင်းပေါ်တွင် ကြယ်တာရာများကဲ့သို့ ထာဝရတောက်ပနေပါစေကြောင်း ဆုမွန်ကောင်းတောင်းအပ်ပါသည်။",
                "မင်းသားလေး၏ ဘဝခရီးလမ်းတွင် အတားအဆီးများဟူသမျှ လွင့်စင်ပျောက်ကွယ်ပြီး အောင်မြင်မှုသရဖူများကို အစဉ်အမြဲ ဆောင်းနိုင်ပါစေကြောင်း ရိုသေစွာ ဆုတောင်းအပ်ပါသည်။"
            ],
            poetic: [
                "ပန်းလွှာတို့ လွင့်ပျံရာ၊ စင်မြင့်ထက်က မင်းသားလေး၊ အပြုံးများဖြင့် လောကကို အလှဆင်နိုင်ပါစေ။ မွေးနေ့မှာ စိတ်၏အေးချမ်းခြင်း အပြည့်အဝ ရရှိပါစေ။",
                "နှလုံးသားချင်း ထပ်တူကျသော ပရိသတ်များ၏ မေတ္တာမိုးသည် မင်းသားလေးကို ထာဝရစောင့်ရှောက်ပါစေ။ ပျော်ရွှင်သော မွေးနေ့လေး ဖြစ်ပါစေဗျာ။"
            ]
        };

        function selectAndGenerateLiveWish(name, type = 'royal') {
            const wishes = newWishes[type];
            const randomWish = wishes[Math.floor(Math.random() * wishes.length)];
            
            document.getElementById('slide-display-area').classList.add('hidden');
            const wishCard = document.getElementById('wish-card-display');
            wishCard.classList.remove('hidden');
            
            document.getElementById('wish-sender-title').innerText = `${name} မှ ဆုတောင်းအပ်ပါသည်။`;
            document.getElementById('wish-generated-text').innerText = `"${randomWish}"`;
        }
    </script>
</body>
</html>
