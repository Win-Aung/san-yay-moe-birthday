<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube Live Celebration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase SDK (Compatible Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #090610; color: #fce8cc; }
        .royal-gold-gradient { background: linear-gradient(135deg, #FFE89C 0%, #D4AF37 50%, #8B6508 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .royal-gold-button { background: linear-gradient(135deg, #D4AF37 0%, #8B6508 100%); color: #090610; font-weight: bold; }
        .glass-panel { background: rgba(15, 10, 25, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="min-h-screen">
    <div class="container mx-auto px-4 py-6">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold royal-gold-gradient">✨ စမ်းရေမိုး YouTube Live Celebration Hub ✨</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Left: OBS Overlay -->
            <div class="lg:col-span-8">
                <div class="border border-amber-500/30 rounded-xl p-8 flex flex-col items-center justify-center min-h-[300px]">
                    <h2 id="display-name" class="text-3xl font-bold text-amber-100 mb-4">မွေးနေ့ဂုဏ်ပြုပွဲ</h2>
                    <p id="display-wish" class="text-xl text-amber-200/90 italic">ပရိသတ်များ ဆုတောင်းစာ ပို့ရန် စောင့်ဆိုင်းနေပါသည်...</p>
                </div>
            </div>

            <!-- Right: Input -->
            <div class="lg:col-span-4 space-y-4">
                <div class="glass-panel p-5 rounded-xl border border-amber-500/30">
                    <h2 class="text-lg font-bold text-amber-300 mb-3">ဆုတောင်းစာ ပို့ရန်</h2>
                    <input id="v-name" type="text" placeholder="သင်၏အမည်" class="w-full bg-black/40 border border-amber-500/30 rounded-lg p-2 text-amber-100 mb-2">
                    <textarea id="v-wish" placeholder="မွေးနေ့ဆုတောင်း..." class="w-full bg-black/40 border border-amber-500/30 rounded-lg p-2 text-amber-100 mb-2 h-20"></textarea>
                    <button onclick="submitWish()" class="w-full py-2 royal-gold-button rounded-lg">ပေးပို့မည်</button>
                </div>
                <div id="qrcode" class="flex justify-center bg-white p-2 rounded w-32 h-32 mx-auto"></div>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com", 
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:8636c870c1411175b62e37"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // QR Code Generation
        new QRCode(document.getElementById("qrcode"), window.location.href);

        // Real-time Listener
        db.ref('latestWish').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('display-name').innerText = `✨ ${data.name} ✨`;
                document.getElementById('display-wish').innerText = data.wish;
            }
        });

        // Submit Wish
        function submitWish() {
            const name = document.getElementById('v-name').value;
            const wish = document.getElementById('v-wish').value;
            if(!name || !wish) return alert("အချက်အလက် ပြည့်စုံအောင် ဖြည့်ပါ။");
            
            db.ref('latestWish').set({ name, wish, timestamp: Date.now() });
            alert("ပေးပို့ပြီးပါပြီ!");
        }
    </script>
</body>
</html>
