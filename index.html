<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး မွေးနေ့ Live Celebration Stage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase CDN SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: radial-gradient(circle, #1a0505 0%, #050202 100%); color: #fce8cc; overflow-x: hidden; }
        .stage-frame { border: 10px solid #d4af37; box-shadow: 0 0 50px rgba(212, 175, 55, 0.3) inset; }
        .gold-glow { text-shadow: 0 0 20px #d4af37; }
        .glass { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="app" class="w-full max-w-7xl mx-auto px-6">

<div id="stage-view"
class="hidden stage-frame rounded-3xl p-20 min-h-[650px]
flex flex-col items-center justify-center text-center">

<h3 id="display-name"
class="text-amber-500 text-8xl font-black mb-10 gold-glow">
မွေးနေ့ဂုဏ်ပြုပွဲ
</h3>

<p id="display-wish"
class="text-5xl font-bold italic text-white leading-relaxed max-w-5xl">
"ပရိသတ်များ၏ ဆုတောင်းစာများ ရောက်ရှိလာပါမည်..."
</p>

</div>
    <script>
        // 🛑 အရေးကြီး - Firebase Config 
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com", // ဤနေရာတွင် သင့် database URL ထည့်ပါ
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:8636c870c1411175b62e37"

            
        };

        // Initialize Firebase (Compat)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // UI Logic
        function switchView(view) {
            document.getElementById('admin-view').classList.toggle('hidden', view !== 'admin');
            document.getElementById('stage-view').classList.toggle('hidden', view !== 'stage');
        }

        // Generate QR
        new QRCode(document.getElementById("qrcode"), window.location.href);

        // Database Logic
        db.ref('latestWish').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('display-name').innerText = `✨ ${data.name} ✨`;
                document.getElementById('display-wish').innerText = `"${data.wish}"`;
            }
        });

        function submitWish() {
            const name = document.getElementById('in-name').value;
            const wish = document.getElementById('in-wish').value;
            if(!name || !wish) return alert("ကျေးဇူးပြု၍ အချက်အလက်ဖြည့်ပါ။");
            db.ref('latestWish').set({ name, wish, timestamp: Date.now() });
            alert("အောင်မြင်စွာ ပေးပို့ပြီးပါပြီ!");
        }
    </script>
</body>
</html>
