<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး မွေးနေ့ Live Celebration Stage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- Firebase CDN SDK (v9 compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        body { font-family: 'Pyidaungsu', sans-serif; background: radial-gradient(circle, #1a0505 0%, #050202 100%); color: #fce8cc; overflow-x: hidden; }
        .stage-frame { border: 10px solid #d4af37; box-shadow: 0 0 50px rgba(212, 175, 55, 0.3) inset; }
        .gold-glow { text-shadow: 0 0 20px #d4af37; }
        .glass { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div id="app" class="w-full max-w-4xl">
        <!-- Control Toggles -->
        <div class="flex justify-center gap-4 mb-8">
            <button onclick="switchView('admin')" class="bg-amber-900 px-6 py-2 rounded-full border border-amber-600 hover:bg-amber-800 transition">Control Panel</button>
            <button onclick="switchView('stage')" class="bg-red-900 px-6 py-2 rounded-full border border-red-600 hover:bg-red-800 transition">Stage View</button>
        </div>

        <!-- Stage View -->
        <div id="stage-view" class="hidden stage-frame rounded-3xl p-12 min-h-[400px] flex flex-col items-center justify-center text-center">
            <h1 id="display-name" class="text-amber-500 text-6xl font-black mb-8 gold-glow">မွေးနေ့ဂုဏ်ပြုပွဲ</h1>
            <p id="display-wish" class="text-3xl font-bold italic text-white leading-relaxed">"ပရိသတ်များ၏ ဆုတောင်းစာများ ရောက်ရှိလာပါမည်..."</p>
			
        </div>

        <!-- Admin View -->
        <div id="admin-view" class="glass p-8 rounded-2xl border border-amber-900">
            <h2 class="text-2xl font-bold text-amber-500 mb-6 text-center">မွေးနေ့ဆုတောင်းပေးပို့နိုင်ပါပြီ</h2>
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <input id="in-name" placeholder="အမည်" class="w-full bg-stone-900 border border-amber-800 p-3 rounded-lg text-white mb-4">
                    <textarea id="in-wish" placeholder="ဆုတောင်းစာ..." class="w-full bg-stone-900 border border-amber-800 p-3 rounded-lg text-white h-32 mb-4"></textarea>
                    <button onclick="submitWish()" class="w-full bg-amber-600 hover:bg-amber-500 py-3 rounded-lg font-bold">ဂုဏ်ပြုပေးပို့မည်</button>
                </div>
                <div class="flex flex-col items-center">
                    <div id="qrcode" class="bg-white p-2 rounded-lg"></div>
                    <p class="mt-2 text-xs text-amber-700">ပရိသတ်များအတွက် QR Code</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🛑 အရေးကြီး - Firebase Config 
        const firebaseConfig = {
            apiKey: "AIzaSyBbRZLUYhEvTHoCscb2ul_JURGsfBjCF4s",
            authDomain: "birthday-62720.firebaseapp.com",
            databaseURL: "https://birthday-62720-default-rtdb.firebaseio.com", // ဤနေရာတွင် သင့် database URL ထည့်ပါ
            projectId: "birthday-62720",
            storageBucket: "birthday-62720.firebasestorage.app",
            messagingSenderId: "915031456534",
            appId: "1:915031456534:web:8636c870c1411175b62e37"

            
        };

        // Initialize Firebase (Compat)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // UI Logic
        function switchView(view) {
            document.getElementById('admin-view').classList.toggle('hidden', view !== 'admin');
            document.getElementById('stage-view').classList.toggle('hidden', view !== 'stage');
        }

        // Generate QR
        new QRCode(document.getElementById("qrcode"), window.location.href);

        // Database Logic
        db.ref('latestWish').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('display-name').innerText = `✨ ${data.name} ✨`;
                document.getElementById('display-wish').innerText = `"${data.wish}"`;
            }
        });

        function submitWish() {
            const name = document.getElementById('in-name').value;
            const wish = document.getElementById('in-wish').value;
            if(!name || !wish) return alert("ကျေးဇူးပြု၍ အချက်အလက်ဖြည့်ပါ။");
            db.ref('latestWish').set({ name, wish, timestamp: Date.now() });
            alert("အောင်မြင်စွာ ပေးပို့ပြီးပါပြီ!");
        }
    </script>
</body>
</html>
