<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube Live Celebration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

    <style>
        body { font-family: 'Pyidaungsu', 'Segoe UI', Roboto, sans-serif; background: #090610; color: #fce8cc; overflow-x: hidden; }
        .royal-gold-gradient { background: linear-gradient(135deg, #FFE89C 0%, #D4AF37 50%, #8B6508 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .royal-gold-button { background: linear-gradient(135deg, #D4AF37 0%, #8B6508 100%); color: #090610; font-weight: bold; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .curtain-backdrop { background: linear-gradient(90deg, #2b0307 0%, #110103 50%, #2b0307 100%); }
        .glass-panel { background: rgba(15, 10, 25, 0.80); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.15); }
        @keyframes fall { 0% { transform: translateY(-50px) rotate(0deg); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        .particle { position: absolute; pointer-events: none; z-index: 5; }
    </style>
</head>
<body class="relative min-h-screen">
    <div id="particles-background" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

    <div class="container mx-auto px-4 py-6 relative z-10">
        <header class="text-center mb-6">
            <h1 class="text-2xl md:text-4xl font-extrabold royal-gold-gradient mb-1 tracking-wider font-serif">✨ စမ်းရေမိုး YouTube Live Celebration Hub ✨</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 flex flex-col gap-5">
                <div id="live-overlay-container" class="relative w-full aspect-video rounded-xl shadow-2xl overflow-hidden curtain-backdrop border border-amber-500/40 flex flex-col p-8">
                    <div class="my-auto text-center z-10" id="slide-display-area">
                        <h2 class="text-2xl md:text-4xl font-bold text-amber-100 mb-4" id="slide-title"></h2>
                        <p class="text-base md:text-lg text-amber-200/90" id="slide-content"></p>
                    </div>
                    <div id="wish-card-display" class="hidden absolute inset-0 bg-black/80 flex flex-col items-center justify-center p-6">
                        <h3 class="text-xl text-amber-400 font-bold mb-2" id="wish-sender-title"></h3>
                        <p class="text-lg text-white italic" id="wish-generated-text"></p>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="prevSlide()" class="glass-panel p-3 text-amber-300 rounded">ယခင်</button>
                    <button onclick="nextSlide()" class="glass-panel p-3 text-amber-300 rounded">နောက်တစ်ပုဒ်</button>
                </div>
            </div>

            <div class="lg:col-span-4 flex flex-col gap-5">
                <div class="glass-panel p-5 rounded-xl border border-amber-500/30">
                    <h2 class="text-lg font-bold text-amber-300 mb-2">ပရိသတ်ဆုတောင်းစနစ်</h2>
                    <div class="flex justify-center p-3 bg-white rounded-lg"><img id="qr-image" class="w-[120px] h-[120px]"></div>
                    <div id="connection-status" class="mt-2 text-xs text-amber-400 text-center font-mono">စနစ်စတင်နေသည်...</div>
                </div>
                <div class="glass-panel p-4 rounded-xl max-h-[200px] overflow-y-auto" id="wishes-queue"></div>
            </div>
        </div>
    </div>

    <!-- Viewer Screen -->
    <div id="viewer-submission-screen" class="hidden fixed inset-0 z-50 bg-[#07050a] p-6 flex flex-col items-center justify-center">
        <div class="max-w-sm w-full space-y-4 glass-panel p-6 rounded-xl">
            <input id="viewer-form-name" type="text" placeholder="သင်၏အမည်" class="w-full bg-black/40 p-3 rounded border border-amber-500/20 text-white">
            <textarea id="viewer-form-wish" placeholder="ဆုတောင်းစကား..." class="w-full bg-black/40 p-3 rounded border border-amber-500/20 text-white"></textarea>
            <button onclick="sendViewerWish()" class="w-full py-3 royal-gold-button rounded">ပေးပို့မည်</button>
        </div>
    </div>

    <script>
        const slidesData = [
            { title: "စင်မြင့်ထက်က အနုပညာကြယ်ပွင့်", content: "သျှင်သျှင်နုနုနဲ့ ရိုးရာအကအလှတွေကို အသက်သွင်းပေးသူ။" },
            { title: "မင်္ဂလာရှိလှသော မွေးနေ့", content: "မင်းသားလေး စမ်းရေမိုးအတွက် အကောင်းဆုံးသော ဆုတောင်းများ။" }
        ];
        let currentSlideIndex = 0;
        let peer, hostId;

        function renderSlide() {
            document.getElementById('slide-title').innerText = slidesData[currentSlideIndex].title;
            document.getElementById('slide-content').innerText = slidesData[currentSlideIndex].content;
        }

        function nextSlide() { currentSlideIndex = (currentSlideIndex + 1) % slidesData.length; renderSlide(); }
        function prevSlide() { currentSlideIndex = (currentSlideIndex - 1 + slidesData.length) % slidesData.length; renderSlide(); }

        function startHost() {
            peer = new Peer();
            peer.on('open', (id) => {
                hostId = id;
                document.getElementById('connection-status').innerText = "ချိတ်ဆက်ရန် အသင့်ဖြစ်ပြီ";
                const url = window.location.href.split('?')[0] + "?view=" + id;
                document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(url)}`;
            });
            peer.on('connection', (conn) => {
                conn.on('data', (data) => displayWish(data.name, data.wish));
            });
        }

        function sendViewerWish() {
            const name = document.getElementById('viewer-form-name').value;
            const wish = document.getElementById('viewer-form-wish').value;
            const conn = new Peer().connect(hostId);
            conn.on('open', () => {
                conn.send({ name, wish });
                alert("ပို့ပြီးပါပြီ!");
            });
        }

        function displayWish(name, text) {
            const display = document.getElementById('wish-card-display');
            document.getElementById('wish-sender-title').innerText = name;
            document.getElementById('wish-generated-text').innerText = text;
            display.classList.remove('hidden');
            
            const queue = document.getElementById('wishes-queue');
            queue.innerHTML += `<div class="p-2 border-b border-amber-900 text-xs">${name}: ${text}</div>`;
            
            setTimeout(() => display.classList.add('hidden'), 8000);
        }

        function initGoldRain() {
            setInterval(() => {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.innerHTML = '✨';
                p.style.animation = `fall ${Math.random() * 3 + 2}s linear`;
                document.getElementById('particles-background').appendChild(p);
                setTimeout(() => p.remove(), 5000);
            }, 1000);
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.has('view')) {
                document.getElementById('viewer-submission-screen').classList.remove('hidden');
                hostId = params.get('view');
            } else {
                startHost();
                renderSlide();
                initGoldRain();
            }
        };
    </script>
</body>
</html>
