<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး YouTube Live Celebration Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #05020a; color: #fce8cc; }
        .glass-panel { background: rgba(20, 10, 40, 0.6); border: 1px solid rgba(212, 175, 55, 0.3); backdrop-filter: blur(10px); }
        .gold-glow { box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .wish-animation { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <header class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-[#D4AF37] mb-2">✨ စမ်းရေမိုး YouTube Live Celebration Hub ✨</h1>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <div class="lg:col-span-8 space-y-6">
            <div id="display-area" class="glass-panel p-8 rounded-2xl h-[600px] flex flex-col gold-glow justify-center items-center text-center">
                <div class="mb-4">
                    <span class="text-xs uppercase tracking-widest text-[#D4AF37]">Live Presentation Screen</span>
                </div>
                <div id="content-container" class="space-y-4">
                    <h2 class="text-3xl font-bold text-[#D4AF37]">ကြိုဆိုပါတယ်</h2>
                    <p class="text-lg text-gray-400">ပရိသတ်များ၏ ဆုတောင်းစာများ ဤနေရာတွင် ပေါ်လာပါမည်။</p>
                </div>
            </div>
            
            <div class="glass-panel p-4 rounded-xl flex gap-4 items-center overflow-x-auto">
                <button class="bg-[#D4AF37]/10 hover:bg-[#D4AF37]/20 border border-[#D4AF37] px-4 py-2 rounded text-sm text-[#D4AF37]">ယခင်</button>
                <button class="bg-[#D4AF37] text-black font-bold px-6 py-2 rounded text-sm">Auto-Play ▶</button>
                <button class="bg-[#D4AF37]/10 hover:bg-[#D4AF37]/20 border border-[#D4AF37] px-4 py-2 rounded text-sm text-[#D4AF37]">နောက်</button>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <!-- QR Section -->
            <div class="glass-panel p-6 rounded-2xl text-center">
                <h3 class="font-bold text-[#D4AF37] mb-4">Viewer Control</h3>
                <button onclick="openViewer()" class="w-full bg-[#D4AF37] text-black font-bold py-3 rounded-lg text-sm hover:brightness-110 transition">💻 VIEWER WINDOW ဖွင့်မည်</button>
            </div>

            <!-- Admin Panel -->
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="font-bold text-[#D4AF37] mb-4">ADMIN PANEL</h3>
                <div class="space-y-3">
                    <input id="api-key" type="password" placeholder="Gemini API Key (Optional)" class="w-full bg-black/50 border border-[#D4AF37]/30 p-3 rounded text-sm text-white focus:outline-none">
                    <input id="fan-name" placeholder="ပရိသတ်အမည် (ဥပမာ- ရွှေရည်)" class="w-full bg-black/50 border border-[#D4AF37]/30 p-3 rounded text-sm text-white focus:outline-none">
                    <textarea id="fan-wish" placeholder="ဆုတောင်းစာ..." class="w-full bg-black/50 border border-[#D4AF37]/30 p-3 rounded text-sm text-white focus:outline-none h-24"></textarea>
                    <button onclick="processWish()" class="w-full bg-[#D4AF37] text-black font-bold py-2 rounded text-sm hover:brightness-110">ပေးပို့ရန်</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        
        // Listen for storage updates
        window.addEventListener('storage', (e) => {
            if(e.key === 'live_wish') {
                updateDisplay(JSON.parse(e.newValue));
            }
        });

        function updateDisplay(data) {
            const container = document.getElementById('content-container');
            container.innerHTML = `
                <div class="wish-animation">
                    <p class="text-sm text-[#D4AF37] mb-2">မှ - ${data.name}</p>
                    <h3 class="text-3xl font-bold text-white mb-6">"${data.wish}"</h3>
                </div>
            `;
        }

        async function processWish() {
            const name = document.getElementById('fan-name').value;
            const wishText = document.getElementById('fan-wish').value;
            const key = document.getElementById('api-key').value;

            if(!name) { alert("အမည်ဖြည့်ပေးပါ"); return; }

            let finalWish = wishText;

            // If API key exists and no custom wish, generate one
            if(key && !wishText) {
                try {
                    const prompt = `Write a short, warm Burmese birthday wish for a fan named ${name} to a performer named San Yay Moe.`;
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await response.json();
                    finalWish = data.candidates[0].content.parts[0].text;
                } catch(e) {
                    finalWish = "မွေးနေ့မှာ ကျန်းမာချမ်းသာပါစေဗျာ။";
                }
            } else if (!wishText) {
                finalWish = "မွေးနေ့မှာ ပျော်ရွှင်ပါစေဗျာ။";
            }

            const payload = { name, wish: finalWish };
            localStorage.setItem('live_wish', JSON.stringify(payload));
            updateDisplay(payload);
        }

        function openViewer() {
            window.open(window.location.href, "_blank", "width=800,height=600");
        }
const firebaseConfig = {
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "your-project-id.firebaseapp.com",
    databaseURL: "https://your-project-id-default-rtdb.firebaseio.com", // ဤနေရာတွင် အမှန်ထည့်ပါ
    projectId: "your-project-id",
    storageBucket: "your-project-id.appspot.com",
    messagingSenderId: "123456789012",
    appId: "1:123456789012:web:xxxxxx"
};
        function updateDisplay(data) {
            document.getElementById('display-name').innerText = `မှ - ${data.name}`;
            document.getElementById('display-wish').innerText = `"${data.wish}"`;
        }

        // ဒီ Function လေးကို ထည့်ပါ
        function toggleOverlay() {
            const content = document.getElementById('main-content');
            // အပေါ်က Input Section ကို ဖျောက်ပြီး Presentation ကိုပဲ ချဲ့ပြပေးပါမယ်
            content.classList.toggle('hidden');
            // Overlay အတွက် Background တစ်ခု သီးခြား ဖန်တီးပေးပါ
        }
    </script>
</body>
</html>
