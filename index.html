<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>စမ်းရေမိုး Stage Celebration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap');
        
        body { 
            font-family: 'Pyidaungsu', sans-serif; 
            background: radial-gradient(circle, #2d0a0a 0%, #0a0404 100%);
            color: #fce8cc; 
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        /* Stage Curtains Effect */
        .stage-curtain {
            background: linear-gradient(90deg, #4a0000 0%, #8b0000 50%, #4a0000 100%);
            box-shadow: inset 0 0 100px #000;
        }

        .stage-frame {
            border: 15px solid #d4af37;
            box-shadow: 0 0 30px #d4af37 inset, 0 0 50px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.7);
        }

        .gold-glow { text-shadow: 0 0 15px #d4af37; }

        /* Smooth UI Animations */
        .fade-in { animation: fadeIn 1s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Admin & Stage Container -->
    <div id="app-shell" class="w-full max-w-4xl">
        
        <!-- Mode Toggles -->
        <div id="controls" class="flex justify-center gap-4 mb-6">
            <button onclick="setMode('admin')" class="px-6 py-2 bg-amber-900 border border-amber-600 rounded-full hover:bg-amber-800 transition">Admin Panel</button>
            <button onclick="setMode('overlay')" class="px-6 py-2 bg-red-900 border border-red-600 rounded-full hover:bg-red-800 transition">Stage View</button>
        </div>

        <!-- Stage View (Overlay) -->
        <div id="overlay-view" class="hidden stage-frame rounded-3xl p-12 min-h-[400px] flex flex-col items-center justify-center text-center">
            <h1 class="text-amber-500 text-6xl font-black mb-8 gold-glow" id="display-title">မွေးနေ့ဂုဏ်ပြုပွဲ</h1>
            <div id="display-box" class="space-y-6">
                <p id="display-wish" class="text-3xl font-bold leading-relaxed italic text-white italic">"ပရိသတ်များရဲ့ ဆုတောင်းစာများကို ဤနေရာတွင် ကြည့်ရှုနိုင်ပါသည်..."</p>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="admin-view" class="bg-black/80 p-8 rounded-2xl border border-amber-900 shadow-2xl">
            <h2 class="text-2xl font-bold text-amber-500 mb-6 text-center">Admin Control Panel</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm text-gray-400 mb-2">အမည်</label>
                    <input id="in-name" type="text" class="w-full bg-stone-900 border border-amber-800 p-3 rounded-lg text-white mb-4">
                    <label class="block text-sm text-gray-400 mb-2">ဆုတောင်းစာ</label>
                    <textarea id="in-wish" class="w-full bg-stone-900 border border-amber-800 p-3 rounded-lg text-white h-32"></textarea>
                    <button onclick="submitWish()" class="w-full mt-4 bg-amber-600 hover:bg-amber-500 py-3 rounded-lg font-bold">ဂုဏ်ပြုပေးပို့မည်</button>
                </div>
                <div class="flex flex-col items-center justify-center">
                    <div id="qrcode" class="bg-white p-2 rounded-lg"></div>
                    <p class="mt-2 text-xs text-amber-700">Scan ဖတ်ပြီး ဆုတောင်းပေးပို့ပါ</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG: သင်၏ API Key များနှင့် အစားထိုးပါ
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            databaseURL: "https://your-project-id.firebaseio.com",
            projectId: "your-project-id"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // UI Setup
        new QRCode(document.getElementById("qrcode"), window.location.href);

        function setMode(mode) {
            document.getElementById('admin-view').classList.toggle('hidden', mode !== 'admin');
            document.getElementById('overlay-view').classList.toggle('hidden', mode !== 'overlay');
        }

        // Firebase Logic
        db.ref('latestWish').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('display-title').innerText = `✨ ${data.name} ✨`;
                document.getElementById('display-wish').innerText = `"${data.wish}"`;
                document.getElementById('display-box').classList.add('fade-in');
            }
        });

        function submitWish() {
            const name = document.getElementById('in-name').value;
            const wish = document.getElementById('in-wish').value;
            if(!name || !wish) return alert("ကျေးဇူးပြု၍ အချက်အလက်ဖြည့်ပါ။");
            
            db.ref('latestWish').set({ name, wish, timestamp: Date.now() });
        }
    </script>
</body>
</html>
